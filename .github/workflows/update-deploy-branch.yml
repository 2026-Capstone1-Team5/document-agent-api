name: Update Deploy Branch

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build deploy snapshot branch
        run: |
          set -eux

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B deploy

          # Convert submodule -> regular tracked directory for Railway builds.
          if [ -d vendor/document-ai ]; then
            git rm --cached -f vendor/document-ai || true
            rm -f vendor/document-ai/.git
            git add vendor/document-ai
          fi

          if [ -f .gitmodules ]; then
            git rm --cached -f .gitmodules || true
            rm -f .gitmodules
          fi

          git add -A
          git commit -m "chore(ci): refresh deploy branch snapshot" || true
          git push -f origin deploy
